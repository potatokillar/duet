<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Orange gradient (Claude) -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F79847"/>
      <stop offset="100%" stop-color="#E56E53"/>
    </linearGradient>

    <!-- Blue gradient (Codex) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A8FEA"/>
      <stop offset="100%" stop-color="#616AC1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#020025"/>

  <!-- Top arc (orange - Claude) -->
  <path d="M 40 55 Q 100 25 160 55"
        stroke="url(#orangeGrad)"
        stroke-width="8"
        fill="none"
        stroke-linecap="round"/>

  <!-- Bottom arc (blue - Codex) -->
  <path d="M 40 75 Q 100 105 160 75"
        stroke="url(#blueGrad)"
        stroke-width="8"
        fill="none"
        stroke-linecap="round"/>

  <!-- duet text -->
  <text x="100" y="155"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48"
        font-weight="bold"
        fill="#F8F8F9"
        text-anchor="middle">duet</text>

</svg>
