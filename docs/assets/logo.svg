<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A27F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4916A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7AA2F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C7FD9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#2d2d44" stroke-width="2"/>

  <!-- Claude circle (left) -->
  <circle cx="65" cy="100" r="40" fill="url(#claudeGrad)" opacity="0.9"/>

  <!-- Codex circle (right) -->
  <circle cx="135" cy="100" r="40" fill="url(#codexGrad)" opacity="0.9"/>

  <!-- Overlap area highlight -->
  <ellipse cx="100" cy="100" rx="15" ry="30" fill="#9B7FD1" opacity="0.6"/>

  <!-- Claude icon (abstract C) -->
  <text x="52" y="108" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a1a2e">C</text>

  <!-- Codex icon (abstract X) -->
  <text x="122" y="108" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a1a2e">X</text>

  <!-- Connection lines -->
  <path d="M 85 70 Q 100 50 115 70" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 85 130 Q 100 150 115 130" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Arrow indicating flow -->
  <path d="M 100 160 L 100 180 M 90 170 L 100 180 L 110 170" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
